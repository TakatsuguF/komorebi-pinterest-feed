name: build-feeds

on:
  schedule:
    - cron: "0 1 * * *"   # 毎日 10:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build feeds
        env:
          KOMOREBI_SHOPIFY_DOMAIN: ${{ secrets.KOMOREBI_SHOPIFY_DOMAIN }}
          KOMOREBI_SHOPIFY_ACCESS_TOKEN: ${{ secrets.KOMOREBI_SHOPIFY_ACCESS_TOKEN }}
        run: python build_feeds.py

      - name: Commit & push
        run: |
          git config user.name "feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add feeds fx_rates.json meta.json
          git diff --cached --quiet || git commit -m "feeds: daily refresh $(date -u +%Y-%m-%d)"
          git push
